###############################################################################
# Key bindings
###############################################################################
setw -g xterm-keys on
set -g default-terminal "screen-256color"
# start window index of 1
set-option -g base-index 1
setw -g pane-base-index 1

# Setting the Window and Panes Index
# start window numbers at 1 to match keyboard order with tmux window order
#set-option -g base-index 1
#set-window-option -g pane-base-index 1
#set-option -g renumber-windows on
#bind-key 1 select-window -t 1
#bind-key 2 select-window -t 2
#bind-key 3 select-window -t 3
#bind-key 4 select-window -t 4
#bind-key 5 select-window -t 5
#bind-key 6 select-window -t 6
#bind-key 7 select-window -t 7
#bind-key 8 select-window -t 8
#bind-key 9 select-window -t 9
#
# Prefix is Ctrl-space
# http://sheerun.net/2014/03/21/how-to-boost-your-vim-productivity/
# Bind <Space> to enter copy mode.
#unbind-key C-b //done with sensible
set-option -g prefix C-Space
#bind-key C-a send-prefix //done with sensible

unbind-key [
bind-key Space copy-mode
bind-key C-Space copy-mode

# Use vim keybindings in copy mode
#set-window-option -g mode-keys vi
#setw -g mode-keys vi
set -g mode-keys vi
#
#unbind-key p
#bind-key p paste-buffer
bind -t vi-copy 'v' begin-selection
#bind -t vi-copy 'y' copy-selection
#bind -t vi-copy Escape cancel

#https://gist.github.com/anonymous/6bebae3eb9f7b972e6f0
#Prevent tmux freezing when lots of text is sent to output
setw -g c0-change-trigger 10
setw -g c0-change-interval 250

setw -g monitor-activity on
set -g visual-activity on


#bind-key q kill-window
#bind-key C-q kill-window
#
#bind-key x kill-pane
#bind-key C-x kill-pane

#setw -g aggressive-resize on //in sensible

